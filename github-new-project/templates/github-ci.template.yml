name: Repository Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repository-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f DESIGN.md
          test -f SUPERPOWERS.md
          test -f .pr_agent.toml
          test -f .github/pull_request_template.md
          test -f .github/workflows/pr-agent.yml
          test -f openspec/project.md
          test -f openspec/CURRENT.md
          test -f openspec/specs/change-management/spec.md

      - name: Verify required directories
        run: |
          test -d openspec/specs
          test -d openspec/changes
